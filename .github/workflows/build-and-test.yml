name: Build package in standalone version
on:
  workflow_dispatch:
  pull_request:

jobs:
  build-and-test:
    name: Build and test
    permissions:
      contents: read
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
        - '3.8'
        - '3.9'
        - '3.10'
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'

    steps:
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install project
        working-directory: ${{ github.workspace }}
        run: pip install -e .[test]

      - name: Use CLI standalone
        run: ${{ vars.MODULE_NAME }} -h

      - name: Use CLI as Python module
        run: python -m ${{ vars.MODULE_NAME }} -h

      - name: Check source code with Ruff
        run: python -m ruff check --config ./conf/ruff-src.toml

      - name: Check tests code with Ruff
        run: python -m ruff check --config ./conf/ruff-tests.toml

      - name: Run unitary tests
        env:
          SCRIPT_PATH: ./scripts/run-tests.sh
        run: |
          chmod +x $SCRIPT_PATH
          $SCRIPT_PATH unitary

      - name: Run integration tests
        env:
          SCRIPT_PATH: ./scripts/run-tests.sh
        run: |
          chmod +x $SCRIPT_PATH
          $SCRIPT_PATH integration

      - name: Run e2e tests
        env:
          SCRIPT_PATH: ./scripts/run-tests.sh
        run: |
          chmod +x $SCRIPT_PATH
          $SCRIPT_PATH e2e

      - name: Generate report files
        if: matrix.python-version == '3.14'
        run: |
          python -m coverage combine ./conf/coverage
          python -m coverage xml
          zip reports.zip coverage.xml report.xml

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: matrix.python-version == '3.14'
        with:
          name: test-reports
          path: reports.zip

  sonar-scan:
    name: Sonar scan
    permissions:
      contents: read
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: test-reports
          path: ${{ github.workspace }}

      - name: Unzip reports
        run: unzip reports.zip

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

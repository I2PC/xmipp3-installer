name: Scan code with SonarQube
on:
  push:
    branches:
      - main

  schedule:
    # Scheduled because SonarQube rules evolve over time
    # and need a re-scan to check against them
    - cron: '0 0 * * 0' # weekly: Sunday 00:00 UTC

  workflow_dispatch:

jobs:
  sonar-scan:
    name: Sonar scan
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: '3.14'

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Install project
        working-directory: ${{ github.workspace }}
        run: pip install -e .[test]

      - name: Run unitary tests
        env:
          SCRIPT_PATH: ./scripts/run-tests.sh
        run: |
          chmod +x $SCRIPT_PATH
          $SCRIPT_PATH unitary

      - name: Run integration tests
        env:
          SCRIPT_PATH: ./scripts/run-tests.sh
        run: |
          chmod +x $SCRIPT_PATH
          $SCRIPT_PATH integration

      - name: Run e2e tests
        env:
          SCRIPT_PATH: ./scripts/run-tests.sh
        run: |
          chmod +x $SCRIPT_PATH
          $SCRIPT_PATH e2e

      - name: Generate report files
        run: |
          python -m coverage combine ./conf/coverage
          python -m coverage xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}



